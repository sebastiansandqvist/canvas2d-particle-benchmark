<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>particle benchmark</title>
  <style>
    body {
      background: #0b0d1a;
      font-family: monospace;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    fieldset {
      box-sizing: border-box;
      border: 2px solid #777;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 13px;
      z-index: 1;
    }

    input {
      accent-color: deepskyblue;
    }

    legend {
      background: #777;
      color: white;
      font-weight: bold;
      padding: 5px 20px;
    }

    label {
      display: flex;
      flex-direction: column;
    }

    select {
      width: 150px;
    }

    .slider-data {
      display: flex;
      justify-content: space-between;
    }

    a {
      color: deepskyblue;
      width: fit-content;
    }
  </style>
</head>

<body>
  <fieldset>
    <legend>Settings</legend>
    <label>
      <div class="slider-data">
        <span>Spawn rate</span>
        <output id="spawn-rate-output">-</output>
      </div>
      <input type="range" min="0" max="1000" value="333" id="spawn-rate" />
    </label>
    <label>
      <div class="slider-data">
        <span>Pool size</span>
        <output id="pool-size-output">-</output>
      </div>
      <input type="range" min="0" max="1000" value="333" id="pool-size" />
    </label>
    <label>
      <div class="slider-data">
        <span>Particle life</span>
        <output id="particle-life-output">-</output>
      </div>
      <input type="range" min="1" max="10" step="0.1" value="2" id="particle-life" />
    </label>
    <label>
      Draw mode
      <select id="draw-mode">
        <option value="none">None</option>
        <option value="batched">Batched</option>
        <option value="single">Single</option>
        <option value="composited">Composited</option>
      </select>
    </label>
    <label>
      Memory management
      <select id="memory-mode">
        <option value="push">Push + filter</option>
        <option value="ring">Ring buffer</option>
      </select>
    </label>
    <a href="https://github.com/sebastiansandqvist/canvas2d-particle-benchmark">View source</a>
  </fieldset>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
